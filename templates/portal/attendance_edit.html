{% extends 'base.html' %}
{% block title %}Edit Attendance{% endblock %}
{% block content %}
<div class="container mt-3">
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
    <div>
      <h2 class="mb-0">Edit Attendance</h2>
      <small class="text-muted">Update the selected record without changing the rest of your workflow.</small>
    </div>
    <a href="{% url 'attendance_history' %}" class="btn btn-outline-secondary">Back to History</a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Member</label>
            <input type="text" class="form-control" value="{{ attendance.member.full_name }}" readonly>
          </div>
          <div class="col-md-6">
            <label class="form-label">Service Type</label>
            <select name="service_type" class="form-select" required>
              {% for value, label in service_types %}
                <option value="{{ value }}" {% if attendance.service_type == value %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Service Date</label>
            <input type="date" name="service_date" class="form-control" value="{{ attendance.service_date|date:'Y-m-d' }}" required>
          </div>
          <div class="col-md-6 d-flex align-items-end">
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" name="attended" id="attended" {% if attendance.attended %}checked{% endif %}>
              <label class="form-check-label" for="attended">Marked as present</label>
            </div>
          </div>
          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="4">{{ attendance.notes }}</textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'attendance_history' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
