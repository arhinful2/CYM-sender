{% extends 'base.html' %}

{% block title %}Access Restricted - Youth Church Management{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body p-5 text-center">
                <h1 class="h3 mb-3">Access Restricted</h1>
                <p class="text-muted mb-4">
                    You are signed in, but this account does not have staff access to the admin portal yet.
                </p>
                <div class="d-flex justify-content-center gap-2 flex-wrap">
                    <a href="{% url 'logout' %}" class="btn btn-outline-secondary">Logout</a>
                    <a href="{% url 'login' %}" class="btn btn-primary">Go to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
